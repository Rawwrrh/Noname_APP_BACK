name: Build and push to ECR

# Cada push a main: GitHub construye la imagen Docker y la sube a ECR.
# No necesitas Docker en tu PC (el runner de GitHub ya lo trae).
on:
  push:
    branches: [main]
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: noname-backend # debe coincidir con el repo que crees en ECR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:latest" -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Imagen subida: $REGISTRY/$ECR_REPOSITORY:latest"
