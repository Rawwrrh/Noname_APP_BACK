# Configuración de AWS App Runner (deploy desde código fuente / GitHub)
# Docs: https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html
version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - npm install
run:
  command: node server.js
  network:
    port: 8080
  # Las variables de entorno (APPWRITE_*, AWS_REGION, etc.) se cargan en la
  # consola de App Runner. Si usas un IAM role de instancia con permisos de
  # Rekognition + Bedrock, NO necesitas AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
  env: []
